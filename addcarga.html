<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CargaFácil | Adicionar Carga</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logoPng">
            <img src="logo.png" alt="Logo CargaFácil" width="90">
        </div>
        <div class="logo">
            Carga Fácil
        </div>
        <nav>
            <a href="index.html"><i class="fas fa-truck-loading"></i> Cargas</a>
            <a href="historico.html"><i class="fas fa-history"></i> Histórico</a>
            <a href="addcarga.html"><i class="fas fa-circle-plus"></i> Adicionar carga</a>
            <a href="login.html"><i class="fas fa-user-circle"></i> Login</a>
        </nav>
    </header>

    <main>

        <h1>Adicionar Nova Carga</h1>

        <form id="addCargaForm" class="add-carga-form" onsubmit="adicionarCarga(event)">
            <div class="form-group">
                <label for="inputOrigem">Origem:</label>
                <input type="text" id="inputOrigem" name="origem" required>
            </div>
            <div class="form-group">
                <label for="inputDestino">Destino:</label>
                <input type="text" id="inputDestino" name="destino" required>
            </div>
            <div class="form-group">
                <label for="inputTipo">Tipo de Carga:</label>
                <input type="text" id="inputTipo" name="tipoCarga" required>
            </div>
            <div class="form-group">
                <label for="inputPeso">Peso (kg) - será convertido para ton:</label>
                <input type="number" id="inputPeso" name="peso" step="0.1" required>
            </div>
            <div class="form-group">
                <label for="inputData">Data Limite:</label>
                <input type="date" id="inputData" name="dataLimite" required>
            </div>
            <div class="form-group">
                <label for="inputValor">Valor do Frete (R$):</label>
                <input type="number" id="inputValor" name="valor" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="inputEmpresa">Nome da Empresa:</label>
                <input type="text" id="inputEmpresa" name="empresa" required>
            </div>
            <button type="submit">Adicionar Carga</button>
            <div id="addCargaMessage" class="message"></div>
        </form>
    </main>

    <bottom>
        <p class="copyright">&copy; 2026 CargaFácil. Todos os direitos reservados.</p>
    </bottom>

    <script src="script.js"></script>
</body>
