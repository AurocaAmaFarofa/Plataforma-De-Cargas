<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CargaFácil | Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logoPng">
            <img src="logo.png" alt="Logo CargaFácil" width="90">
        </div>
        <div class="logo">
            Carga Fácil
        </div>
        <nav>
            <a href="index.html"><i class="fas fa-truck-loading"></i> Cargas</a>
            <a href="historico.html"><i class="fas fa-history"></i> Histórico</a>
            <a href="addcarga.html"><i class="fas fa-circle-plus"></i> Adicionar carga</a>
            <a href="login.html"><i class="fas fa-user-circle"></i> Login</a>
        </nav>
    </header>

    <main class="LoginCointainer">
        <div class="CaixaDeLogin">
            <h1 class="TituloLogin">Log in</h1>
            <div class="User">
                <h2 class="H2User">Usuário</h2>
                <input class="Usuario" id="InputUsuario" type="text" placeholder="Nome de Usuário">
            </div>
            
            <div class="User">
                <h2 class="H2User">Senha</h2>
                <input class="Usuario" id="InputSenha" type="password" placeholder="Senha">
            </div>

            <button type="submit" class="BotãoDoLogin" onclick="realizarLogin()">Entrar</button>

            <button class="BotãoDeEsquecer">Esqueceu sua senha?</button>

            <div id="LoginSucesso" class="message"></div>
        </div>
    </main>

    <bottom>
        <p class="copyrightLogin">&copy; 2026 CargaFácil. Todos os direitos reservados.</p>
    </bottom>

    <script src="script.js"></script>
</body>
</html>
